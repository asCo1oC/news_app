<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Агрегатор Новостей </title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS из static/ (ПРАВИЛЬНЫЙ ПУТЬ!) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">
                    <span class="logo-subtitle">Агрегатор Новостей</span>
                </div>
            </div>
            <nav class="header-nav">
                <button class="nav-btn" onclick="showInfo('about')">О проекте</button>
                <button class="nav-btn" onclick="showInfo('settings')">Настройки</button>
            </nav>
        </div>
        <div class="header-bottom">
            <nav class="main-nav">
                <button class="main-nav-item active" data-category="all">Все новости</button>
                <button class="main-nav-item" data-category="europe">Европа</button>
                <button class="main-nav-item" data-category="asia">Азия</button>
                <button class="main-nav-item" data-category="middle-east">Ближний Восток</button>
                <button class="main-nav-item" data-category="usa">США</button>
            </nav>
            <div class="search-container">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск новостей...">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- News Feed -->
        <section class="news-feed">
            <div class="feed-header">
                <div>
                    <h1 class="feed-title">Лента новостей</h1>
                    <p class="feed-subtitle">Актуальные события мировой политики</p>
                </div>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="category-tab active" data-category="all">Все новости</button>
                <button class="category-tab" data-category="europe">Европа</button>
                <button class="category-tab" data-category="asia">Азия</button>
                <button class="category-tab" data-category="middle-east">Ближний Восток</button>
                <button class="category-tab" data-category="usa">США</button>
            </div>

            <div id="newsGrid" class="news-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="load-more-container">
                <button class="load-more-btn" id="loadMoreBtn" disabled>Загрузить ещё</button>
            </div>
        </section>

        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Categories -->
            <div class="sidebar-section">
                <h2 class="sidebar-title">📁 Категории</h2>
                <div class="category-list" id="sidebarCategories">
                    <div class="category-item active" data-category="all">
                        <span class="category-item-name">📰 Все новости</span>
                        <span class="category-item-count" id="count-all">0</span>
                    </div>
                    <div class="category-item" data-category="europe">
                        <span class="category-item-name">🇪🇺 Европа</span>
                        <span class="category-item-count" id="count-europe">0</span>
                    </div>
                    <div class="category-item" data-category="asia">
                        <span class="category-item-name">🌏 Азия</span>
                        <span class="category-item-count" id="count-asia">0</span>
                    </div>
                    <div class="category-item" data-category="middle-east">
                        <span class="category-item-name">🕌 Ближний Восток</span>
                        <span class="category-item-count" id="count-middle-east">0</span>
                    </div>
                    <div class="category-item" data-category="usa">
                        <span class="category-item-name">🇺🇸 США</span>
                        <span class="category-item-count" id="count-usa">0</span>
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="sidebar-section">
                <h2 class="sidebar-title">📊 Статистика</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalNews">0</div>
                        <div class="stat-label">Всего новостей</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="todayNews">0</div>
                        <div class="stat-label">За сегодня</div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">© 2026 MOIMP-PROJECT. Все права защищены.</p>
        </div>
    </footer>

    <!-- JavaScript из static/ (ПРАВИЛЬНЫЙ ПУТЬ!) -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
